<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Babi Toast Demo</title>
	<link rel="stylesheet" href="./dist/styles.css" />
	<style>
		:root {
			--page-bg: #f5f5f4;
			--panel: #ffffff;
			--panel-border: rgba(15, 23, 42, 0.08);
			--hairline: rgba(15, 23, 42, 0.06);
			--text: #0a0a0a;
			--muted: #71717a;
			--muted-strong: #52525b;
			--accent: #0a0a0a;
			--accent-soft: rgba(15, 23, 42, 0.04);
			--ring: rgba(15, 23, 42, 0.18);
			--font-sans:
				-apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Helvetica Neue",
				Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
			--font-display:
				-apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
			--font-mono:
				"SF Mono", "JetBrains Mono", "Menlo", "Roboto Mono", monospace;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: var(--font-sans);
			font-feature-settings: "ss01", "cv01", "cv11";
			-webkit-font-smoothing: antialiased;
			background: var(--page-bg);
			color: var(--text);
			letter-spacing: -0.005em;
		}

		#app {
			min-height: 100vh;
		}

		.demo-shell {
			display: grid;
			grid-template-columns: minmax(0, 1fr) minmax(0, 320px);
			gap: 24px;
			align-items: start;
			min-height: 100vh;
			padding: 40px 32px;
		}

		.demo-tray {
			position: sticky;
			top: 40px;
			display: grid;
			gap: 14px;
			padding: 20px;
			border: 1px solid var(--panel-border);
			border-radius: 14px;
			background: var(--panel);
		}

		.demo-tray-head strong {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--muted-strong);
		}

		.demo-tray-head p {
			margin: 6px 0 0;
			color: var(--muted);
			font-size: 0.875rem;
			line-height: 1.5;
		}

		.demo-tray-slot {
			display: grid;
			gap: 12px;
			min-height: 80px;
		}

		.demo-tray-slot [data-babi-promoted] {
			padding: 16px;
			border-radius: 12px;
			background: #0a0a0a;
			color: rgba(255, 255, 255, 0.96);
			box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
		}

		.demo-card {
			width: 100%;
			max-width: 920px;
			padding: 32px;
			border: 1px solid var(--panel-border);
			border-radius: 16px;
			background: var(--panel);
		}

		.demo-eyebrow {
			margin: 0 0 12px;
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.14em;
			text-transform: uppercase;
			color: var(--muted-strong);
		}

		.demo-title {
			margin: 0;
			font-family: var(--font-display);
			font-weight: 600;
			font-size: clamp(1.875rem, 3.5vw, 2.75rem);
			line-height: 1.1;
			letter-spacing: -0.025em;
			color: var(--text);
		}

		.demo-copy {
			max-width: 60ch;
			margin: 14px 0 0;
			font-size: 0.95rem;
			line-height: 1.6;
			color: var(--muted-strong);
		}

		.demo-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 10px;
			margin-top: 20px;
		}

		.demo-grid-wide {
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
		}

		.demo-section {
			margin-top: 28px;
			padding-top: 28px;
			border-top: 1px solid var(--hairline);
		}

		.demo-section:first-of-type {
			margin-top: 32px;
			padding-top: 0;
			border-top: 0;
		}

		.demo-section-head {
			display: grid;
			gap: 4px;
		}

		.demo-section-title {
			margin: 0;
			font-size: 0.95rem;
			font-weight: 600;
			letter-spacing: -0.01em;
			color: var(--text);
		}

		.demo-section-copy {
			margin: 0;
			font-size: 0.875rem;
			color: var(--muted);
			line-height: 1.5;
		}

		.demo-button {
			display: inline-flex;
			align-items: center;
			justify-content: space-between;
			gap: 16px;
			width: 100%;
			padding: 14px 16px;
			border: 1px solid var(--panel-border);
			border-radius: 10px;
			background: var(--panel);
			color: inherit;
			font: inherit;
			cursor: pointer;
			text-align: left;
			transition: border-color 120ms ease, background 120ms ease;
		}

		.demo-button:hover {
			border-color: var(--ring);
			background: #fafaf9;
		}

		.demo-button:focus-visible {
			outline: 2px solid var(--text);
			outline-offset: 2px;
		}

		.demo-button strong {
			display: block;
			font-size: 0.875rem;
			font-weight: 600;
			color: var(--text);
		}

		.demo-button span {
			display: block;
			margin-top: 3px;
			color: var(--muted);
			font-size: 0.8125rem;
			line-height: 1.4;
		}

		.demo-arrow {
			font-size: 1.1rem;
			color: var(--muted);
			flex: 0 0 auto;
			transition: color 120ms ease, transform 120ms ease;
		}

		.demo-button:hover .demo-arrow {
			color: var(--text);
			transform: translateX(2px);
		}

		.progress-card,
		.retry-card,
		.summary-card,
		.audio-player-card {
			display: grid;
			gap: 10px;
			padding-top: 2px;
		}

		.body-caption {
			margin: 0;
			font-size: 0.7rem;
			font-weight: 500;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.55);
		}

		.progress-meta {
			display: flex;
			align-items: baseline;
			justify-content: space-between;
			gap: 12px;
			font-size: 0.875rem;
			color: rgba(255, 255, 255, 0.95);
		}

		.progress-meta strong {
			font-weight: 500;
		}

		.progress-track {
			height: 4px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.12);
			overflow: hidden;
		}

		.progress-fill {
			height: 100%;
			border-radius: inherit;
			background: rgba(255, 255, 255, 0.85);
			transition: width 260ms ease;
		}

		.body-stats,
		.summary-grid {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 6px;
		}

		.body-stat,
		.summary-cell {
			display: grid;
			gap: 2px;
			padding: 10px;
			border-radius: 8px;
			background: rgba(255, 255, 255, 0.05);
			border: 1px solid rgba(255, 255, 255, 0.08);
		}

		.body-stat strong,
		.summary-cell strong {
			font-size: 0.875rem;
			font-weight: 500;
			color: rgba(255, 255, 255, 0.95);
		}

		.body-stat span,
		.summary-cell span {
			font-size: 0.7rem;
			font-weight: 500;
			color: rgba(255, 255, 255, 0.55);
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}

		.body-list {
			display: grid;
			gap: 8px;
		}

		.body-list-item {
			display: flex;
			align-items: flex-start;
			gap: 10px;
			font-size: 0.875rem;
			line-height: 1.45;
			color: rgba(255, 255, 255, 0.85);
		}

		.body-dot {
			width: 6px;
			height: 6px;
			margin-top: 7px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.7);
			flex: 0 0 auto;
		}

		.body-dot-warn {
			background: #f59e0b;
			box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18);
		}

		.retry-header {
			display: grid;
			gap: 4px;
		}

		.retry-header strong,
		.summary-headline {
			font-size: 0.9375rem;
			font-weight: 600;
			letter-spacing: -0.005em;
			color: rgba(255, 255, 255, 0.96);
		}

		.retry-hint {
			margin: 0;
			font-size: 0.875rem;
			line-height: 1.45;
			color: rgba(255, 255, 255, 0.6);
		}

		.body-actions {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.retry-card button,
		.summary-cta {
			width: fit-content;
			padding: 8px 14px;
			border: 0;
			border-radius: 8px;
			background: #ffffff;
			color: #0a0a0a;
			font: inherit;
			font-size: 0.8125rem;
			font-weight: 600;
			cursor: pointer;
		}

		.body-button-secondary {
			background: rgba(255, 255, 255, 0.1) !important;
			color: rgba(255, 255, 255, 0.85) !important;
		}

		.summary-card {
			padding: 2px 0 0;
		}

		.summary-default {
			color: rgba(255, 255, 255, 0.96);
		}

		.summary-success .summary-cell {
			background: rgba(34, 197, 94, 0.16);
			border-color: rgba(34, 197, 94, 0.24);
		}

		.summary-accent .summary-cell {
			background: rgba(255, 255, 255, 0.08);
			border-color: rgba(255, 255, 255, 0.14);
		}

		.audio-player-shell {
			display: grid;
			grid-template-columns: 56px minmax(0, 1fr);
			gap: 14px;
			align-items: start;
		}

		.audio-player-art {
			position: relative;
			display: grid;
			place-items: center;
			width: 56px;
			height: 56px;
		}

		.audio-player-art-ring,
		.audio-player-art-core {
			position: absolute;
			border-radius: 999px;
		}

		.audio-player-art-ring {
			inset: 0;
			border: 1px solid rgba(255, 255, 255, 0.14);
			background: rgba(255, 255, 255, 0.04);
		}

		.audio-player-art-core {
			inset: 10px;
			display: grid;
			place-items: center;
			background: rgba(255, 255, 255, 0.92);
			color: #0a0a0a;
			font-size: 0.85rem;
			font-weight: 600;
		}

		.audio-player-main {
			display: grid;
			gap: 10px;
			min-width: 0;
		}

		.audio-player-head {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 12px;
		}

		.audio-player-copy,
		.audio-player-footer {
			margin: 0;
			color: rgba(255, 255, 255, 0.6);
			font-size: 0.8125rem;
			line-height: 1.45;
		}

		.audio-player-toggle {
			padding: 7px 12px;
			border: 0;
			border-radius: 8px;
			background: #ffffff;
			color: #0a0a0a;
			font: inherit;
			font-size: 0.8125rem;
			font-weight: 600;
			cursor: pointer;
			flex: 0 0 auto;
		}

		.audio-waveform {
			display: flex;
			align-items: flex-end;
			gap: 3px;
			height: 44px;
			padding: 8px 10px;
			border-radius: 8px;
			background: rgba(255, 255, 255, 0.05);
			border: 1px solid rgba(255, 255, 255, 0.08);
		}

		.audio-wave-bar {
			flex: 1 1 0;
			min-width: 4px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.65);
			opacity: 0.7;
			transition: transform 180ms ease, opacity 180ms ease;
		}

		.audio-waveform[data-playing="true"] .audio-wave-bar {
			opacity: 1;
			transform: scaleY(1.04);
		}

		.audio-player-footer {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.audio-player-scrub {
			position: relative;
			flex: 1 1 auto;
			height: 3px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.12);
			overflow: hidden;
		}

		.audio-player-scrub-fill {
			position: absolute;
			inset: 0 auto 0 0;
			height: 100%;
			border-radius: inherit;
			background: rgba(255, 255, 255, 0.85);
			transition: width 220ms ease;
		}

		.audio-player-meta {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
		}

		.audio-meta-pill {
			display: inline-flex;
			align-items: center;
			padding: 5px 9px;
			border-radius: 6px;
			background: rgba(255, 255, 255, 0.06);
			border: 1px solid rgba(255, 255, 255, 0.1);
			color: rgba(255, 255, 255, 0.7);
			font-size: 0.7rem;
			font-weight: 500;
			letter-spacing: 0.02em;
		}

		.audio-player-actions {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
		}

		.audio-mini-button {
			padding: 7px 12px;
			border: 0;
			border-radius: 8px;
			background: rgba(255, 255, 255, 0.1);
			color: rgba(255, 255, 255, 0.95);
			font: inherit;
			font-size: 0.8125rem;
			font-weight: 500;
			cursor: pointer;
		}

		.audio-mini-button-secondary {
			background: rgba(255, 255, 255, 0.05);
			color: rgba(255, 255, 255, 0.65);
		}

		.demo-note {
			margin-top: 28px;
			padding: 14px 16px;
			border-radius: 10px;
			background: var(--accent-soft);
			color: var(--text);
			font-size: 0.875rem;
		}

		.demo-note strong {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--muted-strong);
		}

		.demo-note p,
		.demo-log p {
			margin: 6px 0 0;
			line-height: 1.55;
			color: var(--muted-strong);
		}

		.demo-log {
			margin-top: 12px;
			padding: 14px 16px;
			border-radius: 10px;
			background: var(--panel);
			border: 1px solid var(--hairline);
			font-family: var(--font-mono);
			font-size: 0.8125rem;
		}

		.demo-log strong {
			font-family: var(--font-sans);
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--muted-strong);
		}

		.demo-toast-title {
			letter-spacing: 0.04em;
			text-transform: uppercase;
		}

		.demo-toast-copy {
			color: #3f3f46;
		}

		.demo-toast-badge {
			box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
		}

		.demo-toast-button {
			font-weight: 600;
		}

		@media (max-width: 960px) {
			.demo-shell {
				grid-template-columns: minmax(0, 1fr);
			}

			.demo-tray {
				position: static;
			}
		}

		@media (max-width: 640px) {
			.demo-shell {
				padding: 24px 18px;
			}

			.demo-card {
				padding: 22px;
				border-radius: 14px;
			}

			.body-stats,
			.summary-grid {
				grid-template-columns: 1fr;
			}

			.audio-player-shell {
				grid-template-columns: 1fr;
			}
		}
	</style>
	<script type="importmap">
		{
			"imports": {
				"vue": "./vendor/vue.esm-browser.prod.js",
				"@tsogtoodev/babi-toast": "./dist/index.mjs"
			}
		}
	</script>
</head>
<body>
	<div id="app"></div>
	<script type="module" src="./main.mjs"></script>
</body>
</html>
