image: node:24-alpine

stages:
  - verify
  - release

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

default:
  interruptible: true
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
  before_script:
    - command -v npm >/dev/null 2>&1 || (echo "npm is required. Install Node.js >=22 on this runner." >&2; exit 1)
    - node -e "const major=+process.versions.node.split('.')[0]; if(major<22){console.error('Node.js >=22 is required. Current: '+process.versions.node); process.exit(1)}"
    - test -f package-lock.json || (echo "package-lock.json is required. Run npm install and commit lockfile." >&2; exit 1)
    - npm config set cache .npm --global
    - npm ci --no-audit --no-fund

typecheck:
  stage: verify
  script:
    - npm run typecheck

build:
  stage: verify
  needs: ["typecheck"]
  script:
    - npm run build
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - dist/

release_package:
  stage: release
  needs: ["build"]
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - when: never
  script:
    - npm run build
    - npm pack
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - "*.tgz"
