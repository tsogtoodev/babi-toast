image: node:20-alpine

stages:
  - verify
  - release

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

default:
  interruptible: true
  cache:
    key: deps-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .bun-cache/
      - .npm/
  before_script:
    - |
      if ! command -v bun >/dev/null 2>&1 && ! command -v npm >/dev/null 2>&1; then
        if command -v curl >/dev/null 2>&1; then
          curl -fsSL https://bun.sh/install | bash
        elif command -v wget >/dev/null 2>&1; then
          wget -qO- https://bun.sh/install | bash
        else
          echo "Neither bun/npm is available and curl/wget is missing; cannot bootstrap runtime." >&2
          exit 1
        fi
        export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
        export PATH="$BUN_INSTALL/bin:$PATH"
      fi

      if command -v bun >/dev/null 2>&1; then
        test -f bun.lock
        bun install --frozen-lockfile --cache-dir .bun-cache
      elif command -v npm >/dev/null 2>&1; then
        npm config set cache .npm --global
        if [ -f package-lock.json ]; then
          npm ci --no-audit --no-fund
        else
          npm install --no-audit --no-fund
        fi
      else
        echo "No usable package manager found after bootstrap attempt." >&2
        exit 1
      fi

typecheck:
  stage: verify
  script:
    - |
      if command -v bun >/dev/null 2>&1; then
        bunx tsc --noEmit
      else
        npm exec -- tsc --noEmit
      fi

build:
  stage: verify
  needs: ["typecheck"]
  script:
    - |
      if command -v bun >/dev/null 2>&1; then
        bun run build
      else
        npm run build
      fi
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - dist/

release_package:
  stage: release
  needs: ["build"]
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - when: never
  script:
    - |
      if command -v bun >/dev/null 2>&1; then
        bun run build
      else
        npm run build
      fi
    - npm pack
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - "*.tgz"
