image: oven/bun:1.2-alpine

stages:
  - verify
  - release

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

default:
  interruptible: true
  cache:
    key: bun-${CI_COMMIT_REF_SLUG}
    paths:
      - .bun-cache/
  before_script:
    - test -f bun.lock
    - bun install --frozen-lockfile --cache-dir .bun-cache

typecheck:
  stage: verify
  script:
    - bunx tsc --noEmit

build:
  stage: verify
  needs: ["typecheck"]
  script:
    - bun run build
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - dist/

release_package:
  stage: release
  needs: ["build"]
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - when: never
  script:
    - bun run build
    - npm pack
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - "*.tgz"
