<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Babi Toast Demo</title>
	<link rel="stylesheet" href="/dist/styles.css" />
	<style>
		:root {
			--page-bg: radial-gradient(circle at top, #f6d8b8 0%, #f1ede4 38%, #d8e0ea 100%);
			--panel: rgba(255, 252, 247, 0.76);
			--panel-border: rgba(58, 44, 32, 0.12);
			--text: #20170f;
			--muted: #5f554d;
			--accent: #8f3e19;
			--accent-soft: rgba(143, 62, 25, 0.12);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Iowan Old Style", "Palatino Linotype", serif;
			background: var(--page-bg);
			color: var(--text);
		}

		#app {
			min-height: 100vh;
		}

		.demo-shell {
			display: grid;
			place-items: center;
			min-height: 100vh;
			padding: 32px;
		}

		.demo-card {
			width: min(920px, 100%);
			padding: 28px;
			border: 1px solid var(--panel-border);
			border-radius: 28px;
			background: var(--panel);
			backdrop-filter: blur(20px);
			box-shadow: 0 20px 80px rgba(35, 25, 17, 0.14);
		}

		.demo-eyebrow {
			margin: 0 0 10px;
			font-size: 12px;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			color: var(--accent);
		}

		.demo-title {
			margin: 0;
			font-size: clamp(2.3rem, 5vw, 4.5rem);
			line-height: 0.95;
		}

		.demo-copy {
			max-width: 54ch;
			margin: 16px 0 0;
			font-size: 1.05rem;
			line-height: 1.6;
			color: var(--muted);
		}

		.demo-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 14px;
			margin-top: 28px;
		}

		.demo-grid-wide {
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
		}

		.demo-section + .demo-section {
			margin-top: 26px;
			padding-top: 24px;
			border-top: 1px solid rgba(32, 23, 15, 0.08);
		}

		.demo-section-head {
			display: grid;
			gap: 6px;
		}

		.demo-section-title {
			margin: 0;
			font-size: 1.2rem;
		}

		.demo-section-copy {
			margin: 0;
			color: var(--muted);
			line-height: 1.5;
		}

		.demo-button {
			display: inline-flex;
			align-items: center;
			justify-content: space-between;
			gap: 16px;
			width: 100%;
			padding: 16px 18px;
			border: 1px solid rgba(32, 23, 15, 0.08);
			border-radius: 18px;
			background: #fffaf4;
			color: inherit;
			font: inherit;
			cursor: pointer;
			transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
		}

		.demo-button:hover {
			transform: translateY(-1px);
			border-color: rgba(143, 62, 25, 0.26);
			box-shadow: 0 12px 28px rgba(35, 25, 17, 0.08);
		}

		.demo-button strong {
			display: block;
			font-size: 1rem;
		}

		.demo-button span {
			display: block;
			margin-top: 4px;
			color: var(--muted);
			font-size: 0.92rem;
			text-align: left;
		}

		.demo-arrow {
			font-size: 1.4rem;
			color: var(--accent);
		}

		.progress-card,
		.retry-card,
		.summary-card,
		.audio-player-card {
			display: grid;
			gap: 10px;
			padding-top: 2px;
		}

		.body-caption {
			margin: 0;
			font-size: 0.78rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: rgba(255, 214, 170, 0.86);
		}

		.progress-meta {
			display: flex;
			align-items: baseline;
			justify-content: space-between;
			gap: 12px;
			font-size: 0.92rem;
			color: rgba(255, 248, 239, 0.96);
		}

		.progress-track {
			height: 8px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.14);
			overflow: hidden;
		}

		.progress-fill {
			height: 100%;
			border-radius: inherit;
			background: linear-gradient(90deg, #ca6b37 0%, #5c2d17 100%);
			transition: width 260ms ease;
		}

		.body-stats,
		.summary-grid {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 8px;
		}

		.body-stat,
		.summary-cell {
			display: grid;
			gap: 2px;
			padding: 10px;
			border-radius: 12px;
			background: rgba(255, 255, 255, 0.08);
			border: 1px solid rgba(255, 255, 255, 0.12);
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
		}

		.body-stat strong,
		.summary-cell strong {
			font-size: 0.96rem;
			color: rgba(255, 248, 239, 0.96);
		}

		.body-stat span,
		.summary-cell span {
			font-size: 0.76rem;
			color: rgba(255, 225, 198, 0.72);
			text-transform: uppercase;
			letter-spacing: 0.04em;
		}

		.body-list {
			display: grid;
			gap: 8px;
		}

		.body-list-item {
			display: flex;
			align-items: flex-start;
			gap: 10px;
			font-size: 0.92rem;
			line-height: 1.45;
			color: rgba(255, 241, 229, 0.9);
		}

		.body-dot {
			width: 8px;
			height: 8px;
			margin-top: 5px;
			border-radius: 999px;
			background: #b85c30;
			flex: 0 0 auto;
		}

		.body-dot-warn {
			background: #8f3e19;
			box-shadow: 0 0 0 3px rgba(143, 62, 25, 0.12);
		}

		.retry-header {
			display: grid;
			gap: 6px;
		}

		.retry-header strong,
		.summary-headline {
			font-size: 1rem;
			color: rgba(255, 248, 239, 0.96);
		}

		.retry-hint {
			margin: 0;
			font-size: 0.92rem;
			line-height: 1.45;
			color: rgba(255, 225, 198, 0.74);
		}

		.body-actions {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.retry-card button,
		.summary-cta {
			width: fit-content;
			padding: 8px 14px;
			border: 0;
			border-radius: 999px;
			background: var(--accent);
			color: white;
			font: inherit;
			cursor: pointer;
		}

		.body-button-secondary {
			background: rgba(255, 255, 255, 0.12) !important;
			color: rgba(255, 245, 235, 0.95) !important;
		}

		.summary-card {
			padding: 2px 0 0;
		}

		.summary-default {
			color: rgba(255, 248, 239, 0.96);
		}

		.summary-success .summary-cell {
			background: rgba(91, 152, 103, 0.24);
		}

		.summary-accent .summary-cell {
			background: rgba(177, 101, 51, 0.28);
		}

		.audio-player-shell {
			display: grid;
			grid-template-columns: 64px minmax(0, 1fr);
			gap: 14px;
			align-items: start;
		}

		.audio-player-art {
			position: relative;
			display: grid;
			place-items: center;
			width: 64px;
			height: 64px;
		}

		.audio-player-art-ring,
		.audio-player-art-core {
			position: absolute;
			border-radius: 999px;
		}

		.audio-player-art-ring {
			inset: 0;
			border: 1px solid rgba(255, 255, 255, 0.18);
			background:
				radial-gradient(circle at 30% 30%, rgba(255, 214, 170, 0.16), transparent 55%),
				linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
		}

		.audio-player-art-core {
			inset: 12px;
			display: grid;
			place-items: center;
			background: linear-gradient(180deg, rgba(255, 214, 170, 0.95), rgba(202, 107, 55, 0.84));
			color: #20170f;
			font-size: 0.95rem;
			font-weight: 700;
		}

		.audio-player-main {
			display: grid;
			gap: 10px;
			min-width: 0;
		}

		.audio-player-head {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 12px;
		}

		.audio-player-copy,
		.audio-player-footer {
			margin: 0;
			color: rgba(255, 225, 198, 0.74);
			font-size: 0.88rem;
			line-height: 1.45;
		}

		.audio-player-toggle {
			padding: 8px 12px;
			border: 0;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.12);
			color: rgba(255, 248, 239, 0.96);
			font: inherit;
			cursor: pointer;
			flex: 0 0 auto;
		}

		.audio-waveform {
			display: flex;
			align-items: flex-end;
			gap: 4px;
			height: 48px;
			padding: 8px 10px;
			border-radius: 14px;
			background: rgba(255, 255, 255, 0.08);
			border: 1px solid rgba(255, 255, 255, 0.12);
		}

		.audio-wave-bar {
			flex: 1 1 0;
			min-width: 5px;
			border-radius: 999px;
			background: linear-gradient(180deg, rgba(255, 214, 170, 0.95) 0%, rgba(202, 107, 55, 0.82) 100%);
			opacity: 0.72;
			transition: transform 180ms ease, opacity 180ms ease;
		}

		.audio-waveform[data-playing="true"] .audio-wave-bar {
			opacity: 1;
			transform: scaleY(1.04);
		}

		.audio-player-footer {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.audio-player-scrub {
			position: relative;
			flex: 1 1 auto;
			height: 4px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.12);
			overflow: hidden;
		}

		.audio-player-scrub-fill {
			position: absolute;
			inset: 0 auto 0 0;
			height: 100%;
			border-radius: inherit;
			background: linear-gradient(90deg, rgba(255, 214, 170, 0.95), rgba(202, 107, 55, 0.84));
			transition: width 220ms ease;
		}

		.audio-player-meta {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.audio-meta-pill {
			display: inline-flex;
			align-items: center;
			padding: 6px 10px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.08);
			border: 1px solid rgba(255, 255, 255, 0.12);
			color: rgba(255, 235, 214, 0.84);
			font-size: 0.75rem;
			letter-spacing: 0.03em;
		}

		.audio-player-actions {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.audio-mini-button {
			padding: 8px 12px;
			border: 0;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.12);
			color: rgba(255, 248, 239, 0.96);
			font: inherit;
			cursor: pointer;
		}

		.audio-mini-button-secondary {
			background: rgba(255, 255, 255, 0.08);
			color: rgba(255, 225, 198, 0.78);
		}

		.demo-note {
			margin-top: 22px;
			padding: 14px 16px;
			border-radius: 16px;
			background: var(--accent-soft);
			color: #4d2d1c;
			font-size: 0.95rem;
		}

		.demo-note p,
		.demo-log p {
			margin: 8px 0 0;
			line-height: 1.5;
		}

		.demo-log {
			margin-top: 16px;
			padding: 14px 16px;
			border-radius: 16px;
			background: rgba(255, 255, 255, 0.64);
			border: 1px solid rgba(32, 23, 15, 0.08);
		}

		.demo-toast-title {
			letter-spacing: 0.04em;
			text-transform: uppercase;
		}

		.demo-toast-copy {
			color: #4b3527;
		}

		.demo-toast-badge {
			box-shadow: inset 0 0 0 1px rgba(32, 23, 15, 0.08);
		}

		.demo-toast-button {
			font-weight: 700;
		}

		@media (max-width: 640px) {
			.demo-shell {
				padding: 18px;
			}

			.demo-card {
				padding: 20px;
				border-radius: 22px;
			}

			.body-stats,
			.summary-grid {
				grid-template-columns: 1fr;
			}

			.audio-player-shell {
				grid-template-columns: 1fr;
			}
		}
	</style>
	<script type="importmap">
		{
			"imports": {
				"vue": "/node_modules/vue/dist/vue.esm-browser.js",
				"@tsogtbayar/babi-toast": "/dist/index.mjs"
			}
		}
	</script>
</head>
<body>
	<div id="app"></div>
	<script type="module" src="/demo/main.mjs"></script>
</body>
</html>
